# HookBus subscriber registry with optional AgentSpend enabled.
# Edit this file, then: docker compose restart hookbus
subscribers:
  - name: cre-agentprotect
    type: sync
    transport: http
    address: http://cre-agentprotect:8878
    timeout: 5.0
    events: [PreToolUse, PostToolUse, PostLLMCall, UserPromptSubmit, Stop]
    metadata:
      vendor: Agentic Thinking Limited
      licence: MIT

  - name: agentspend
    type: async
    transport: http
    address: http://agentspend:8879/event
    events: [PreToolUse, PostToolUse, PostLLMCall, UserPromptSubmit, Stop]
    metadata:
      vendor: Agentic Thinking Limited
      licence: MIT
